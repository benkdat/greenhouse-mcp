services:
  - type: web
    name: greenhouse-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py streamable-http
    envVars:
      - key: GREENHOUSE_API_KEY
        sync: false   # Set this manually in Render dashboard — never commit the key
      - key: PORT
        value: "8000"
    healthCheckPath: /
    plan: free
